<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)" />
  
  <!-- Inner glow -->
  <circle cx="50" cy="50" r="40" fill="url(#grad2)" opacity="0.5" />
  
  <!-- Music note -->
  <g fill="white" transform="translate(32, 25)">
    <!-- Note head -->
    <ellipse cx="18" cy="45" rx="10" ry="8" transform="rotate(-20, 18, 45)" />
    
    <!-- Note stem -->
    <rect x="26" y="10" width="4" height="38" rx="2" />
    
    <!-- Note flag -->
    <path d="M30 10 Q45 20 35 35" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" />
  </g>
  
  <!-- Play triangle overlay -->
  <polygon points="60,35 60,65 80,50" fill="white" fill-opacity="0.3" />
  
  <!-- Radio waves -->
  <g stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6">
    <path d="M70 25 Q78 30 70 35" />
    <path d="M73 20 Q85 28 73 40" />
  </g>
</svg>
