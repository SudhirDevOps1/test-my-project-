<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.9; transform: scale(1.05); }
      }
      @keyframes wave1 {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.9; transform: scale(1.2); }
      }
      @keyframes wave2 {
        0%, 100% { opacity: 0.2; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.3); }
      }
      @keyframes rotateSlow {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes rotateReverse {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(-360deg); }
      }
      @keyframes equalizer {
        0%, 100% { transform: scaleY(0.5); }
        50% { transform: scaleY(1.4); }
      }
      @keyframes equalizer2 {
        0%, 100% { transform: scaleY(0.3); }
        50% { transform: scaleY(1.6); }
      }
      @keyframes equalizer3 {
        0%, 100% { transform: scaleY(0.6); }
        50% { transform: scaleY(1.2); }
      }
      @keyframes equalizer4 {
        0%, 100% { transform: scaleY(0.4); }
        50% { transform: scaleY(1.5); }
      }
      @keyframes spinNote {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes floatNote {
        0%, 100% { transform: translateY(0px); opacity: 0.6; }
        50% { transform: translateY(-25px); opacity: 1; }
      }
      @keyframes floatNote2 {
        0%, 100% { transform: translateY(0px); opacity: 0.5; }
        50% { transform: translateY(25px); opacity: 0.9; }
      }
      @keyframes shine {
        0% { transform: translateX(-100%) rotate(25deg); }
        100% { transform: translateX(200%) rotate(25deg); }
      }

      .bg-pulse { animation: pulse 2.5s ease-in-out infinite; transform-origin: center; }
      .wave-1 { animation: wave1 2s ease-in-out infinite; transform-origin: center; }
      .wave-2 { animation: wave2 2s ease-in-out 0.4s infinite; transform-origin: center; }
      .spin-star { animation: rotateSlow 20s linear infinite; transform-origin: center; }
      .spin-reverse { animation: rotateReverse 15s linear infinite; transform-origin: center; }
      .eq-bar1 { animation: equalizer 1.2s ease-in-out infinite; transform-origin: bottom; }
      .eq-bar2 { animation: equalizer2 1.5s ease-in-out 0.2s infinite; transform-origin: bottom; }
      .eq-bar3 { animation: equalizer3 1.0s ease-in-out 0.4s infinite; transform-origin: bottom; }
      .eq-bar4 { animation: equalizer4 1.3s ease-in-out 0.6s infinite; transform-origin: bottom; }
      .slow-spin { animation: spinNote 25s linear infinite; transform-origin: center; }
      .float-note { animation: floatNote 4s ease-in-out infinite; }
      .float-note-delay { animation: floatNote2 4.5s ease-in-out 1s infinite; }
      .shine-layer { animation: shine 3s linear infinite; }
    </style>

    <!-- Rich gradient backgrounds -->
    <radialGradient id="bgGrad" cx="45%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="25%" stop-color="#c084fc"/>
      <stop offset="60%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>

    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fae8ff" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#d8b4fe" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="outerRing" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="#ec4899" stop-opacity="0"/>
      <stop offset="92%" stop-color="#f43f5e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.5"/>
    </radialGradient>

    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <linearGradient id="eqGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>

    <linearGradient id="vinylGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <linearGradient id="vinylShine" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComponentTransfer in="blur">
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer decorative ring (animated pulse) -->
  <circle cx="540" cy="540" r="520" fill="none" stroke="url(#outerRing)" stroke-width="8" class="bg-pulse"/>

  <!-- Main background circle -->
  <circle cx="540" cy="540" r="490" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Inner soft glow -->
  <circle cx="540" cy="540" r="460" fill="url(#innerGlow)"/>

  <!-- Circular progress ring with dash -->
  <circle cx="540" cy="540" r="440" fill="none" stroke="#fef08a" stroke-width="2" opacity="0.25" stroke-dasharray="8 12"/>
  <circle cx="540" cy="540" r="420" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.15" stroke-dasharray="4 8"/>

  <!-- Vinyl record disc behind the equalizer (subtle spinning) -->
  <g class="spin-reverse" opacity="0.15">
    <circle cx="540" cy="540" r="350" fill="url(#vinylGrad)"/>
    <circle cx="540" cy="540" r="340" fill="none" stroke="#334155" stroke-width="2"/>
    <circle cx="540" cy="540" r="320" fill="none" stroke="#334155" stroke-width="1"/>
    <circle cx="540" cy="540" r="280" fill="none" stroke="#1e293b" stroke-width="3"/>
    <circle cx="540" cy="540" r="200" fill="none" stroke="#334155" stroke-width="1.5"/>
    <rect x="535" y="540" width="10" height="280" fill="#ffffff" opacity="0.1"/>
  </g>

  <!-- Shine overlay on vinyl -->
  <rect x="0" y="0" width="1080" height="1080" fill="url(#vinylShine)" opacity="0.08" class="shine-layer" pointer-events="none"/>

  <!-- Decorative tiny stars / particles (rotating) -->
  <g class="spin-star" fill="#fef08a" opacity="0.9" filter="url(#glow)">
    <circle cx="540" cy="80" r="5"/>
    <circle cx="540" cy="1000" r="5"/>
    <circle cx="80" cy="540" r="5"/>
    <circle cx="1000" cy="540" r="5"/>
    <circle cx="180" cy="180" r="4"/>
    <circle cx="900" cy="900" r="4"/>
    <circle cx="180" cy="900" r="4"/>
    <circle cx="900" cy="180" r="4"/>
    <circle cx="320" cy="120" r="3"/>
    <circle cx="760" cy="120" r="3"/>
    <circle cx="320" cy="960" r="3"/>
    <circle cx="760" cy="960" r="3"/>
    <circle cx="120" cy="320" r="3"/>
    <circle cx="120" cy="760" r="3"/>
    <circle cx="960" cy="320" r="3"/>
    <circle cx="960" cy="760" r="3"/>
  </g>

  <!-- Floating music notes (ambient) -->
  <g class="float-note" filter="url(#strongGlow)">
    <ellipse cx="220" cy="300" rx="18" ry="14" transform="rotate(-22, 220, 300)" fill="url(#noteGrad)" opacity="0.7"/>
    <rect x="236" y="230" width="6" height="72" rx="3" fill="url(#noteGrad)" opacity="0.7"/>
    <path d="M242 230 Q270 250 258 280 Q264 260 250 242" fill="url(#noteGrad)" opacity="0.7"/>
  </g>
  <g class="float-note-delay" filter="url(#strongGlow)">
    <ellipse cx="860" cy="780" rx="18" ry="14" transform="rotate(-18, 860, 780)" fill="url(#noteGrad)" opacity="0.7"/>
    <rect x="876" y="710" width="6" height="72" rx="3" fill="url(#noteGrad)" opacity="0.7"/>
    <path d="M882 710 Q910 730 898 760 Q904 740 890 722" fill="url(#noteGrad)" opacity="0.7"/>
  </g>

  <!-- == EQUALIZER BARS (8 bars, centered) == -->
  <g transform="translate(540, 520)" filter="url(#glow)">
    <!-- Bar 1 -->
    <rect x="-120" y="80" width="20" height="120" rx="10" fill="url(#eqGrad)" class="eq-bar1" opacity="0.9"/>
    <!-- Bar 2 -->
    <rect x="-85" y="40" width="20" height="160" rx="10" fill="url(#eqGrad)" class="eq-bar2" opacity="0.9"/>
    <!-- Bar 3 -->
    <rect x="-50" y="60" width="20" height="140" rx="10" fill="url(#eqGrad)" class="eq-bar3" opacity="0.9"/>
    <!-- Bar 4 -->
    <rect x="-15" y="20" width="20" height="180" rx="10" fill="url(#eqGrad)" class="eq-bar4" opacity="0.95"/>
    <!-- Bar 5 (center) -->
    <rect x="20" y="0" width="20" height="200" rx="10" fill="url(#eqGrad)" class="eq-bar1" opacity="1"/>
    <!-- Bar 6 -->
    <rect x="55" y="30" width="20" height="160" rx="10" fill="url(#eqGrad)" class="eq-bar2" opacity="0.95"/>
    <!-- Bar 7 -->
    <rect x="90" y="60" width="20" height="130" rx="10" fill="url(#eqGrad)" class="eq-bar3" opacity="0.9"/>
    <!-- Bar 8 -->
    <rect x="125" y="80" width="20" height="120" rx="10" fill="url(#eqGrad)" class="eq-bar4" opacity="0.9"/>
  </g>

  <!-- == RADIO WAVES (expanding from center-right) == -->
  <g stroke="#fef08a" fill="none" stroke-linecap="round" filter="url(#strongGlow)">
    <!-- Wave set 1 -->
    <path d="M720 480 Q740 540 720 600" stroke-width="5" class="wave-1"/>
    <path d="M750 450 Q780 540 750 630" stroke-width="3.5" class="wave-2"/>
    <path d="M780 420 Q820 540 780 660" stroke-width="2.5" class="wave-1"/>
    <!-- Wave set 2 (mirrored left) -->
    <path d="M360 480 Q340 540 360 600" stroke-width="5" class="wave-1"/>
    <path d="M330 450 Q300 540 330 630" stroke-width="3.5" class="wave-2"/>
    <path d="M300 420 Q260 540 300 660" stroke-width="2.5" class="wave-1"/>
  </g>

  <!-- == MAIN MUSIC NOTE (large, center-left) == -->
  <g transform="translate(380, 360)" filter="url(#shadow)">
    <!-- Note head -->
    <ellipse cx="120" cy="280" rx="65" ry="50" transform="rotate(-22, 120, 280)" fill="url(#noteGrad)"/>
    <!-- Note stem -->
    <rect x="168" y="60" width="24" height="222" rx="12" fill="url(#noteGrad)"/>
    <!-- Graceful flag -->
    <path d="M192 60 Q270 120 240 220 Q260 150 210 85" fill="url(#noteGrad)" stroke="none"/>
    <!-- Secondary flag -->
    <path d="M192 120 Q270 180 240 270 Q260 200 210 145" fill="url(#noteGrad)" opacity="0.85"/>
    <!-- Tertiary flag (extra flow) -->
    <path d="M192 180 Q260 230 235 310 Q250 250 210 200" fill="url(#noteGrad)" opacity="0.7"/>
  </g>

  <!-- == SECONDARY SMALL NOTE (harmony, right side) == -->
  <g transform="translate(620, 580)" filter="url(#glow)">
    <ellipse cx="80" cy="270" rx="40" ry="32" transform="rotate(-18, 80, 270)" fill="url(#noteGrad)" opacity="0.85"/>
    <rect x="112" y="110" width="18" height="162" rx="9" fill="url(#noteGrad)" opacity="0.85"/>
    <path d="M130 110 Q180 150 160 210 Q168 170 145 135" fill="url(#noteGrad)" opacity="0.8"/>
    <path d="M130 160 Q175 195 158 250 Q165 215 145 185" fill="url(#noteGrad)" opacity="0.7"/>
  </g>

  <!-- == TERTIARY TINY NOTE (floating above) == -->
  <g class="slow-spin" transform="translate(180, 200)" filter="url(#glow)">
    <ellipse cx="40" cy="120" rx="22" ry="16" transform="rotate(-25, 40, 120)" fill="url(#noteGrad)" opacity="0.6"/>
    <rect x="58" y="40" width="10" height="84" rx="5" fill="url(#noteGrad)" opacity="0.6"/>
    <path d="M68 40 Q95 55 88 80 Q92 65 78 50" fill="url(#noteGrad)" opacity="0.6"/>
  </g>

  <!-- == PLAY TRIANGLE (modern overlay, center) == -->
  <g filter="url(#strongGlow)">
    <polygon points="540,480 540,600 660,540" fill="#ffffff" fill-opacity="0.25" stroke="#ffffff" stroke-width="3"/>
    <polygon points="548,490 548,590 638,540" fill="#ffffff" fill-opacity="0.1"/>
  </g>

  <!-- Central accent dot (energy point) -->
  <circle cx="540" cy="540" r="12" fill="#fef08a" opacity="0.95" filter="url(#glow)"/>
  <circle cx="540" cy="540" r="5" fill="#ffffff" opacity="0.9"/>

  <!-- Small decorative dots near notes -->
  <circle cx="320" cy="620" r="6" fill="#ffffff" opacity="0.5" filter="url(#glow)"/>
  <circle cx="760" cy="380" r="5" fill="#fef08a" opacity="0.4" filter="url(#glow)"/>
  <circle cx="480" cy="280" r="4" fill="#ffffff" opacity="0.5"/>
  <circle cx="680" cy="720" r="6" fill="#fef08a" opacity="0.4" filter="url(#glow)"/>

  <!-- Outer glitter border -->
  <g fill="#fef08a" opacity="0.6" class="spin-star">
    <circle cx="540" cy="45" r="6"/>
    <circle cx="540" cy="1035" r="6"/>
    <circle cx="45" cy="540" r="6"/>
    <circle cx="1035" cy="540" r="6"/>
    <circle cx="160" cy="160" r="5"/>
    <circle cx="920" cy="920" r="5"/>
    <circle cx="160" cy="920" r="5"/>
    <circle cx="920" cy="160" r="5"/>
  </g>
</svg>
