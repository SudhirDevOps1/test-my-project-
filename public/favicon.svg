<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.4; transform: scale(1); }
        50% { opacity: 0.9; transform: scale(1.05); }
      }
      @keyframes wave1 {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.2); }
      }
      @keyframes wave2 {
        0%, 100% { opacity: 0.2; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.3); }
      }
      @keyframes rotateSlow {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes equalizer {
        0%, 100% { transform: scaleY(0.6); }
        50% { transform: scaleY(1.2); }
      }
      @keyframes equalizer2 {
        0%, 100% { transform: scaleY(0.4); }
        50% { transform: scaleY(1.4); }
      }
      @keyframes equalizer3 {
        0%, 100% { transform: scaleY(0.8); }
        50% { transform: scaleY(1.1); }
      }
      @keyframes spinNote {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .bg-pulse { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
      .wave-1 { animation: wave1 1.8s ease-in-out infinite; transform-origin: center; }
      .wave-2 { animation: wave2 1.8s ease-in-out 0.3s infinite; transform-origin: center; }
      .spin-star { animation: rotateSlow 12s linear infinite; transform-origin: center; }
      .eq-bar1 { animation: equalizer 1.2s ease-in-out infinite; transform-origin: bottom; }
      .eq-bar2 { animation: equalizer2 1.5s ease-in-out 0.2s infinite; transform-origin: bottom; }
      .eq-bar3 { animation: equalizer3 1.0s ease-in-out 0.4s infinite; transform-origin: bottom; }
      .slow-spin { animation: spinNote 20s linear infinite; transform-origin: center; }
    </style>

    <!-- Rich gradient backgrounds -->
    <radialGradient id="bgGrad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#d8b4fe"/>
      <stop offset="30%" stop-color="#a855f7"/>
      <stop offset="70%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>

    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5d0fe" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#c084fc" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="outerRing" cx="50%" cy="50%" r="50%">
      <stop offset="85%" stop-color="#ec4899" stop-opacity="0"/>
      <stop offset="93%" stop-color="#f43f5e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.45"/>
    </radialGradient>

    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>

    <linearGradient id="eqGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.45"/>
    </filter>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComponentTransfer in="blur">
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer decorative ring (animated pulse) -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#outerRing)" stroke-width="3" class="bg-pulse"/>

  <!-- Main background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Inner soft glow -->
  <circle cx="50" cy="50" r="42" fill="url(#innerGlow)"/>

  <!-- Circular progress ring (static, stylish) -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#fef08a" stroke-width="0.8" opacity="0.25" stroke-dasharray="2 4"/>

  <!-- Decorative tiny stars / particles (rotating) -->
  <g class="spin-star" fill="#fef08a" opacity="0.8" filter="url(#glow)">
    <circle cx="50" cy="10" r="1.5"/>
    <circle cx="50" cy="90" r="1.5"/>
    <circle cx="10" cy="50" r="1.5"/>
    <circle cx="90" cy="50" r="1.5"/>
    <circle cx="20" cy="20" r="1.2"/>
    <circle cx="80" cy="80" r="1.2"/>
    <circle cx="20" cy="80" r="1.2"/>
    <circle cx="80" cy="20" r="1.2"/>
    <circle cx="32" cy="14" r="1"/>
    <circle cx="68" cy="14" r="1"/>
    <circle cx="32" cy="86" r="1"/>
    <circle cx="68" cy="86" r="1"/>
  </g>

  <!-- == EQUALIZER BARS (animated) == -->
  <g transform="translate(58, 38)" filter="url(#glow)">
    <rect x="0" y="8" width="3" height="18" rx="1.5" fill="url(#eqGrad)" class="eq-bar1" opacity="0.9"/>
    <rect x="6" y="4" width="3" height="22" rx="1.5" fill="url(#eqGrad)" class="eq-bar2" opacity="0.9"/>
    <rect x="12" y="6" width="3" height="20" rx="1.5" fill="url(#eqGrad)" class="eq-bar3" opacity="0.9"/>
  </g>

  <!-- == RADIO WAVES (animated) == -->
  <g stroke="#fef08a" fill="none" stroke-linecap="round" filter="url(#strongGlow)">
    <path d="M72 28 Q80 35 72 42" stroke-width="2.4" class="wave-1"/>
    <path d="M76 22 Q88 32 76 48" stroke-width="1.8" class="wave-2"/>
    <path d="M80 18 Q96 28 80 52" stroke-width="1.2" class="wave-1"/>
  </g>

  <!-- == MUSIC NOTE (main) == -->
  <g transform="translate(26, 22)" filter="url(#shadow)">
    <!-- Note head -->
    <ellipse cx="20" cy="48" rx="11" ry="8.5" transform="rotate(-22, 20, 48)" fill="url(#noteGrad)"/>
    <!-- Note stem -->
    <rect x="28" y="8" width="4.5" height="42" rx="2" fill="url(#noteGrad)"/>
    <!-- Graceful flag -->
    <path d="M32 8 Q50 20 42 38 Q46 24 36 15" fill="url(#noteGrad)" stroke="none"/>
    <!-- Secondary flag -->
    <path d="M32 20 Q47 30 40 47 Q44 34 36 26" fill="url(#noteGrad)" opacity="0.85"/>
  </g>

  <!-- == SECONDARY SMALL NOTE (harmony) == -->
  <g transform="translate(12, 24)" filter="url(#glow)">
    <ellipse cx="14" cy="46" rx="7" ry="5.5" transform="rotate(-18, 14, 46)" fill="url(#noteGrad)" opacity="0.8"/>
    <rect x="19" y="18" width="3" height="30" rx="1.5" fill="url(#noteGrad)" opacity="0.8"/>
    <path d="M22 18 Q32 26 28 36 Q30 26 25 21" fill="url(#noteGrad)" opacity="0.7"/>
  </g>

  <!-- == PLAY TRIANGLE (modern, semi‑transparent overlay) == -->
  <g filter="url(#strongGlow)">
    <polygon points="61,36 61,64 82,50" fill="#ffffff" fill-opacity="0.3" stroke="#ffffff" stroke-width="0.8"/>
    <polygon points="62,38 62,62 79,50" fill="#ffffff" fill-opacity="0.15"/>
  </g>

  <!-- Central accent dot (bindi / energy point) -->
  <circle cx="50" cy="50" r="2.5" fill="#fef08a" opacity="0.95" filter="url(#glow)"/>

  <!-- Small decorative dot near the note -->
  <circle cx="46" cy="34" r="1.2" fill="#ffffff" opacity="0.6"/>
</svg>
